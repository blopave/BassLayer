<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#000"/>
  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
  </g>
  <!-- Bass (serif italic) -->
  <text x="340" y="350" font-family="Georgia, serif" font-weight="900" font-style="italic" font-size="140" fill="#E5E5E5" letter-spacing="-2">Bass</text>
  <!-- Layer (grotesk light) -->
  <text x="680" y="350" font-family="Helvetica, Arial, sans-serif" font-weight="300" font-size="108" fill="#E5E5E5" letter-spacing="10" text-transform="uppercase">LAYER</text>
  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" font-family="monospace" font-size="11" fill="#555" letter-spacing="4">BUENOS AIRES — ELECTRONIC MUSIC — CRYPTO</text>
</svg>
